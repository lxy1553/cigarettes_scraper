<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>жүӢеҚ·зғҹдёқд»·ж јеҜ№жҜ”</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 20px; }
  h1 { font-size: 22px; margin-bottom: 5px; }
  .subtitle { color: #666; font-size: 13px; margin-bottom: 15px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 15px; }
  .tabs button { padding: 8px 18px; border: none; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 13px; font-weight: 600; background: #e0e0e0; color: #555; }
  .tabs button.active { background: #263238; color: #fff; }
  .tabs button:hover { background: #37474f; color: #fff; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
  .filters select, .filters input { padding: 5px 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 12px; background: #fff; }
  .stats { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .stat-card { background: #fff; padding: 8px 14px; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); font-size: 12px; }
  .stat-card b { font-size: 16px; color: #e65100; display: block; }
  .no-warn { background: #fff3e0; border: 1px solid #ffe0b2; border-radius: 6px; padding: 8px 12px; font-size: 12px; margin-bottom: 10px; color: #e65100; display: none; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); font-size: 12px; }
  th { background: #263238; color: #fff; padding: 7px 5px; text-align: left; white-space: nowrap; cursor: pointer; position: sticky; top: 0; font-size: 11px; }
  th:hover { background: #37474f; }
  td { padding: 5px; border-bottom: 1px solid #eee; white-space: nowrap; }
  tr:hover { background: #fafafa; }
  .ch-pipeuncle { color: #1565c0; font-weight: 600; }
  .ch-huasheng { color: #2e7d32; font-weight: 600; }
  .ch-иҠұеә— { color: #e65100; font-weight: 600; }
  .ch-nov { color: #6a1b9a; font-weight: 600; }
  .ch-sp { color: #00838f; font-weight: 600; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .tag { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; }
  .tag-жүӢеҚ·дёқ { background: #e3f2fd; color: #1565c0; }
  .tag-зғҹж–—дёқ { background: #f3e5f5; color: #6a1b9a; }
  .tag-жҲҗе“Ғзғҹ { background: #fff3e0; color: #e65100; }
  .tag-иҖ—жқҗ { background: #e8f5e9; color: #2e7d32; }
  .tag-йӣӘиҢ„ { background: #fce4ec; color: #c62828; }
  .tag-еҠ зғӯзғҹеј№ { background: #fbe9e7; color: #bf360c; }
  .tag-еҘ—йӨҗ { background: #e0f2f1; color: #00695c; }
  .no-weight { color: #bbb; font-style: italic; }
  .empty { text-align: center; padding: 40px; color: #999; }
  @media (max-width: 768px) {
    body { padding: 10px; }
    table { font-size: 11px; }
    td, th { padding: 3px; }
  }
</style>
</head>
<body>

<h1>рҹҡ¬ д»·ж јеҜ№жҜ”</h1>
<div class="subtitle">еҗ«зЁҺд»· = е•Ҷе“Ғд»· Г— 1.5 В· е…ӢеҚ•д»· = еҗ«зЁҺд»· Г· йҮҚйҮҸ В· 20ж”ҜжҲҗжң¬ = 12gГ—е…ӢеҚ•д»· + ВҘ3.50</div>

<div class="tabs" id="tabs">
  <button class="active" onclick="switchTab('tobacco')">рҹҡ¬ жүӢеҚ·дёқ + зғҹж–—дёқ</button>
  <button onclick="switchTab('consumable')">рҹ§» иҖ—жқҗ</button>
  <button onclick="switchTab('other')">рҹ“Ұ жҲҗе“Ғзғҹ + е…¶д»–</button>
</div>

<div class="stats" id="stats"></div>
<div class="no-warn" id="noWarn">вҡ пёҸ йғЁеҲҶдә§е“Ғзјәе°‘йҮҚйҮҸж•°жҚ®пјҢж— жі•и®Ўз®—е…ӢеҚ•д»·е’Ң20ж”ҜжҲҗжң¬</div>

<div class="filters">
  <select id="filterChannel" onchange="render()"><option value="">е…ЁйғЁжё йҒ“</option></select>
  <select id="filterBrand" onchange="render()"><option value="">е…ЁйғЁе“ҒзүҢ</option></select>
  <select id="filterType" onchange="render()"><option value="">е…ЁйғЁеӨ§зұ»</option></select>
  <input id="filterName" list="nameList" placeholder="жҗңдә§е“ҒеҗҚ..." oninput="render()" style="width:140px">
  <datalist id="nameList"></datalist>
  <input id="filterSearch" placeholder="е…Ёж–Үжҗңзҙў..." oninput="render()" style="width:120px">
  <span style="font-size:12px;color:#888;line-height:28px" id="count"></span>
</div>

<div style="overflow-x:auto">
<table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
</div>

<script>
let products = [], filteredCache = [];
let sortCol = -1, sortAsc = true;
let currentTab = 'tobacco';

const TAB_TYPES = {
  tobacco: ['жүӢеҚ·дёқ', 'зғҹж–—дёқ'],
  consumable: ['иҖ—жқҗ'],
  other: ['жҲҗе“Ғзғҹ', 'йӣӘиҢ„', 'еҠ зғӯзғҹеј№', 'еҘ—йӨҗ', 'зғҹдёқ', 'е…¶д»–'],
};

const CH_NAMES = {pipeuncle:'иҢ„иҗҘ',huasheng:'еҚҺзӣӣ','иҠұеә—':'иҠұеә—',nov:'nov',sp:'sp'};

fetch('data/ads/products.json').then(r=>r.json()).then(data => {
  products = data.map(p => {
    const price = parseFloat(p['дәәж°‘еёҒд»·ж ј']) || 0;
    const usd = parseFloat(p['зҫҺе…ғд»·ж ј']) || 0;
    const weight = parseFloat(p['йҮҚйҮҸ(е…Ӣ)']) || 0;
    const tax = price * 1.5;
    const perG = weight > 0 ? tax / weight : 0;
    return {
      channel: p['жё йҒ“'], name: p['дә§е“ҒеҗҚз§°'], brand: p['е“ҒзүҢ'],
      type: p['дә§е“ҒеӨ§зұ»'], weight, price, usd, tax: +tax.toFixed(2),
      perG: +perG.toFixed(2), per500: +(perG*500).toFixed(2), cost20: perG>0 ? +(12*perG+3.5).toFixed(2) : 0,
      link: p['е•Ҷе“Ғй“ҫжҺҘ'] || '',
    };
  });
  initFilters();
  switchTab('tobacco');
});

function initFilters() {
  const channels = [...new Set(products.map(p=>p.channel))].sort();
  document.getElementById('filterChannel').innerHTML = '<option value="">е…ЁйғЁжё йҒ“</option>'
    + channels.map(c => '<option value="'+c+'">'+(CH_NAMES[c]||c)+'</option>').join('');

  const brands = [...new Set(products.map(p=>p.brand))].filter(Boolean).sort();
  document.getElementById('filterBrand').innerHTML = '<option value="">е…ЁйғЁе“ҒзүҢ</option>'
    + brands.map(b => '<option value="'+b+'">'+b+'</option>').join('');

  const types = [...new Set(products.map(p=>p.type))].filter(Boolean).sort();
  document.getElementById('filterType').innerHTML = '<option value="">е…ЁйғЁеӨ§зұ»</option>'
    + types.map(t => '<option value="'+t+'">'+t+'</option>').join('');

  document.getElementById('nameList').innerHTML = products.map(p =>
    '<option value="'+p.name.replace(/"/g,'&quot;')+'">').join('');
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('#tabs button').forEach((b,i) =>
    b.className = ['tobacco','consumable','other'][i]===tab?'active':'');
  sortCol = 9; sortAsc = true;
  render();
  document.getElementById('noWarn').style.display =
    (tab==='tobacco' && filtered().filter(p=>p.weight===0).length > 0) ? 'block' : 'none';
}

function filtered() {
  const tabTypes = TAB_TYPES[currentTab] || [];
  const ch = document.getElementById('filterChannel').value;
  const brand = document.getElementById('filterBrand').value;
  const type = document.getElementById('filterType').value;
  const name = document.getElementById('filterName').value.toLowerCase();
  const search = document.getElementById('filterSearch').value.toLowerCase();
  return products.filter(p => {
    if (!tabTypes.includes(p.type)) return false;
    if (ch && p.channel !== ch) return false;
    if (brand && p.brand !== brand) return false;
    if (type && p.type !== type) return false;
    if (name && !p.name.toLowerCase().includes(name)) return false;
    if (search && !p.name.toLowerCase().includes(search)
      && !p.brand.toLowerCase().includes(search)) return false;
    return true;
  });
}

function truncate(name, max=30) {
  return name.length > max ? name.slice(0, max-1)+'вҖҰ' : name;
}

function render() {
  const data = filtered();
  filteredCache = data;
  document.getElementById('count').textContent = `е…ұ ${data.length} жқЎ`;

  const chs = new Set(data.map(p=>p.channel));
  const brands = new Set(data.map(p=>p.brand));
  const hasP = data.filter(p=>p.price>0);
  const noW = data.filter(p=>p.weight===0);
  const minP = hasP.length ? Math.min(...hasP.map(p=>p.price)).toFixed(2) : '-';
  const maxP = hasP.length ? Math.max(...hasP.map(p=>p.price)).toFixed(2) : '-';
  document.getElementById('stats').innerHTML = `
    <div class="stat-card">жё йҒ“ <b>${chs.size}</b></div>
    <div class="stat-card">е“ҒзүҢ <b>${brands.size}</b></div>
    <div class="stat-card">дә§е“Ғ <b>${data.length}</b></div>
    <div class="stat-card">ж— йҮҚйҮҸ <b>${noW.length}</b></div>
    <div class="stat-card">д»·ж ј ВҘ<b>${minP}</b> ~ <b>${maxP}</b></div>`;

  const headers = ['жё йҒ“','дә§е“ҒеҗҚз§°','е“ҒзүҢ','еӨ§зұ»','йҮҚйҮҸ(g)','е•Ҷе“Ғд»·ВҘ','е•Ҷе“Ғд»·$','еҗ«зЁҺд»·ВҘ','е…ӢеҚ•д»·ВҘ/g','500gВҘ','20ж”ҜжҲҗжң¬ВҘ','й“ҫжҺҘ'];
  const keys = ['channel','name','brand','type','weight','price','usd','tax','perG','per500','cost20','link'];
  document.getElementById('thead').innerHTML = '<tr>'+headers.map((h,i)=>
    `<th onclick="sortTable(${i})">${h}${sortCol===i?(sortAsc?' в–І':' в–ј'):''}</th>`).join('')+'</tr>';

  document.getElementById('tbody').innerHTML = data.length ? data.map(p=>{
    const chName = CH_NAMES[p.channel]||p.channel;
    const wDisplay = p.weight ? p.weight+'g' : '<span class="no-weight">ж— </span>';
    const gDisplay = p.perG ? 'ВҘ'+p.perG.toFixed(2) : '<span class="no-weight">вҖ”</span>';
    const cDisplay = p.cost20 ? 'ВҘ'+p.cost20.toFixed(2) : '<span class="no-weight">вҖ”</span>';
    return `<tr>
      <td class="ch-${p.channel}">${chName}</td>
      <td title="${p.name.replace(/"/g,'&quot;')}">${truncate(p.name)}</td>
      <td>${p.brand}</td>
      <td><span class="tag tag-${p.type}">${p.type}</span></td>
      <td class="num">${wDisplay}</td>
      <td class="num">ВҘ${p.price.toFixed(2)}</td>
      <td class="num">$${p.usd.toFixed(2)}</td>
      <td class="num">ВҘ${p.tax.toFixed(2)}</td>
      <td class="num">${gDisplay}</td>
      <td class="num">${p.per500?'ВҘ'+p.per500.toFixed(2):'<span class="no-weight">вҖ”</span>'}</td>
      <td class="num"><b>${cDisplay}</b></td>
      <td>${p.link?'<a href="'+p.link+'" target="_blank">рҹ”—</a>':''}</td>
    </tr>`;
  }).join('') : '<tr><td colspan="12" class="empty">ж— еҢ№й…Қдә§е“Ғ</td></tr>';
}

function sortTable(col) {
  if (sortCol===col) sortAsc=!sortAsc; else { sortCol=col; sortAsc=true; }
  const keys = ['channel','name','brand','type','weight','price','usd','tax','perG','per500','cost20','link'];
  const key = keys[col];
  products.sort((a,b)=>{
    const va = a[key]??'', vb = b[key]??'';
    return typeof va==='string' ? (sortAsc?va.localeCompare(vb):vb.localeCompare(va)) : sortAsc?va-vb:vb-va;
  });
  render();
}
</script>
</body>
</html>
