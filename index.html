<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手卷烟丝价格对比</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 20px; }
  h1 { font-size: 22px; margin-bottom: 5px; }
  .subtitle { color: #666; font-size: 13px; margin-bottom: 15px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 15px; }
  .tabs button { padding: 8px 18px; border: none; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 13px; font-weight: 600; background: #e0e0e0; color: #555; }
  .tabs button.active { background: #263238; color: #fff; }
  .tabs button:hover { background: #37474f; color: #fff; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
  .filters select, .filters input { padding: 5px 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 12px; background: #fff; }
  .stats { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .stat-card { background: #fff; padding: 8px 14px; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); font-size: 12px; }
  .stat-card b { font-size: 16px; color: #e65100; display: block; }
  .no-warn { background: #fff3e0; border: 1px solid #ffe0b2; border-radius: 6px; padding: 8px 12px; font-size: 12px; margin-bottom: 10px; color: #e65100; display: none; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); font-size: 12px; }
  th { background: #263238; color: #fff; padding: 7px 5px; text-align: left; white-space: nowrap; cursor: pointer; position: sticky; top: 0; font-size: 11px; }
  th:hover { background: #37474f; }
  td { padding: 5px; border-bottom: 1px solid #eee; white-space: nowrap; }
  tr:hover { background: #fafafa; }
  .ch-pipeuncle { color: #1565c0; font-weight: 600; }
  .ch-huasheng { color: #2e7d32; font-weight: 600; }
  .ch-花店 { color: #e65100; font-weight: 600; }
  .ch-nov { color: #6a1b9a; font-weight: 600; }
  .ch-sp { color: #00838f; font-weight: 600; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .tag { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; }
  .tag-手卷丝 { background: #e3f2fd; color: #1565c0; }
  .tag-烟斗丝 { background: #f3e5f5; color: #6a1b9a; }
  .tag-成品烟 { background: #fff3e0; color: #e65100; }
  .tag-耗材 { background: #e8f5e9; color: #2e7d32; }
  .tag-雪茄 { background: #fce4ec; color: #c62828; }
  .tag-加热烟弹 { background: #fbe9e7; color: #bf360c; }
  .tag-套餐 { background: #e0f2f1; color: #00695c; }
  .no-weight { color: #bbb; font-style: italic; }
  .empty { text-align: center; padding: 40px; color: #999; }
  /* AI panel */
  .ai-panel { margin-top: 20px; background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); overflow: hidden; }
  .ai-panel summary { padding: 10px 14px; cursor: pointer; font-weight: 600; font-size: 14px; background: #fafafa; }
  .ai-panel summary:hover { background: #f0f0f0; }
  .ai-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .ai-body textarea { width: 100%; min-height: 80px; border: 1px solid #ddd; border-radius: 6px; padding: 8px; font-size: 13px; resize: vertical; }
  .ai-body .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .ai-body input[type=text] { flex: 1; min-width: 200px; padding: 6px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; }
  .ai-body button { padding: 6px 16px; background: #263238; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .ai-body button:hover { background: #37474f; }
  .ai-body button:disabled { opacity: .5; cursor: not-allowed; }
  .ai-body .response { background: #f5f5f5; border-radius: 6px; padding: 10px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; max-height: 400px; overflow-y: auto; display: none; }
  .ai-body .hint { font-size: 11px; color: #999; }
  @media (max-width: 768px) {
    body { padding: 10px; }
    table { font-size: 11px; }
    td, th { padding: 3px; }
  }
</style>
</head>
<body>

<h1>🚬 价格对比</h1>
<div class="subtitle">含税价 = 商品价 × 1.5 · 克单价 = 含税价 ÷ 重量 · 20支成本 = 12g×克单价 + ¥3.50</div>

<div class="tabs" id="tabs">
  <button class="active" onclick="switchTab('tobacco')">🚬 烟丝 + 烟斗丝</button>
  <button onclick="switchTab('consumable')">🧻 耗材</button>
  <button onclick="switchTab('other')">📦 成品烟 + 其他</button>
</div>

<div class="stats" id="stats"></div>
<div class="no-warn" id="noWarn">⚠️ 部分产品缺少重量数据，无法计算克单价和20支成本</div>

<div class="filters">
  <select id="filterChannel" onchange="render()"><option value="">全部渠道</option></select>
  <select id="filterBrand" onchange="render()"><option value="">全部品牌</option></select>
  <select id="filterType" onchange="render()"><option value="">全部大类</option></select>
  <input id="filterName" list="nameList" placeholder="搜产品名..." oninput="render()" style="width:140px">
  <datalist id="nameList"></datalist>
  <input id="filterSearch" placeholder="全文搜索..." oninput="render()" style="width:120px">
  <span style="font-size:12px;color:#888;line-height:28px" id="count"></span>
</div>

<div style="overflow-x:auto">
<table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
</div>

<details class="ai-panel">
<summary>🤖 AI 分析（接入 DeepSeek）</summary>
<div class="ai-body">
  <div class="row">
    <input type="text" id="aiKey" placeholder="输入你的 DeepSeek API Key..." />
    <button onclick="askAI()" id="aiBtn">发送</button>
  </div>
  <textarea id="aiQuery" placeholder="例如：推荐 20支成本最低的手卷丝品牌，预算每包¥50以内..."></textarea>
  <div id="aiResponse" class="response"></div>
  <div class="hint">💡 分析时会自动附带当前筛选产品的数据摘要作为上下文</div>
</div>
</details>

<script>
let products = [], filteredCache = [];
let sortCol = -1, sortAsc = true;
let currentTab = 'tobacco';

const TAB_TYPES = {
  tobacco: ['烟丝', '烟斗丝'],
  consumable: ['耗材'],
  other: ['成品烟', '雪茄', '加热烟弹', '套餐', '烟丝', '其他'],
};

const CH_NAMES = {pipeuncle:'茄营',huasheng:'华盛','花店':'花店',nov:'nov',sp:'sp'};

fetch('data/ads/products.json').then(r=>r.json()).then(data => {
  products = data.map(p => {
    const price = parseFloat(p['人民币价格']) || 0;
    const usd = parseFloat(p['美元价格']) || 0;
    const weight = parseFloat(p['重量(克)']) || 0;
    const tax = price * 1.5;
    const perG = weight > 0 ? tax / weight : 0;
    return {
      channel: p['渠道'], name: p['产品名称'], brand: p['品牌'],
      flavor: p['口味'] || '', type: p['产品大类'], weight, price, usd, tax: +tax.toFixed(2),
      perG: +perG.toFixed(2), per500: +(perG*500).toFixed(2), cost20: perG>0 ? +(12*perG+3.5).toFixed(2) : 0,
      link: p['商品链接'] || '',
    };
  });
  initFilters();
  switchTab('tobacco');
});

function initFilters() {
  const channels = [...new Set(products.map(p=>p.channel))].sort();
  document.getElementById('filterChannel').innerHTML = '<option value="">全部渠道</option>'
    + channels.map(c => '<option value="'+c+'">'+(CH_NAMES[c]||c)+'</option>').join('');

  const brands = [...new Set(products.map(p=>p.brand))].filter(Boolean).sort();
  document.getElementById('filterBrand').innerHTML = '<option value="">全部品牌</option>'
    + brands.map(b => '<option value="'+b+'">'+b+'</option>').join('');

  const types = [...new Set(products.map(p=>p.type))].filter(Boolean).sort();
  document.getElementById('filterType').innerHTML = '<option value="">全部大类</option>'
    + types.map(t => '<option value="'+t+'">'+t+'</option>').join('');

  document.getElementById('nameList').innerHTML = products.map(p =>
    '<option value="'+p.name.replace(/"/g,'&quot;')+'">').join('');
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('#tabs button').forEach((b,i) =>
    b.className = ['tobacco','consumable','other'][i]===tab?'active':'');
  sortCol = 9; sortAsc = true;
  render();
  document.getElementById('noWarn').style.display =
    (tab==='tobacco' && filtered().filter(p=>p.weight===0).length > 0) ? 'block' : 'none';
}

function filtered() {
  const tabTypes = TAB_TYPES[currentTab] || [];
  const ch = document.getElementById('filterChannel').value;
  const brand = document.getElementById('filterBrand').value;
  const type = document.getElementById('filterType').value;
  const name = document.getElementById('filterName').value.toLowerCase();
  const search = document.getElementById('filterSearch').value.toLowerCase();
  return products.filter(p => {
    if (!tabTypes.includes(p.type)) return false;
    if (ch && p.channel !== ch) return false;
    if (brand && p.brand !== brand) return false;
    if (type && p.type !== type) return false;
    if (name && !p.name.toLowerCase().includes(name)) return false;
    if (search && !p.name.toLowerCase().includes(search)
      && !p.brand.toLowerCase().includes(search)) return false;
    return true;
  });
}

function truncate(name, max=30) {
  return name.length > max ? name.slice(0, max-1)+'…' : name;
}

function render() {
  const data = filtered();
  filteredCache = data;
  document.getElementById('count').textContent = `共 ${data.length} 条`;

  const chs = new Set(data.map(p=>p.channel));
  const brands = new Set(data.map(p=>p.brand));
  const hasP = data.filter(p=>p.price>0);
  const noW = data.filter(p=>p.weight===0);
  const minP = hasP.length ? Math.min(...hasP.map(p=>p.price)).toFixed(2) : '-';
  const maxP = hasP.length ? Math.max(...hasP.map(p=>p.price)).toFixed(2) : '-';
  document.getElementById('stats').innerHTML = `
    <div class="stat-card">渠道 <b>${chs.size}</b></div>
    <div class="stat-card">品牌 <b>${brands.size}</b></div>
    <div class="stat-card">产品 <b>${data.length}</b></div>
    <div class="stat-card">无重量 <b>${noW.length}</b></div>
    <div class="stat-card">价格 ¥<b>${minP}</b> ~ <b>${maxP}</b></div>`;

  const headers = ['渠道','产品名称','品牌','口味','大类','重量(g)','商品价¥','商品价$','含税价¥','克单价¥/g','500g¥','20支成本¥','链接'];
  const keys = ['channel','name','brand','flavor','type','weight','price','usd','tax','perG','per500','cost20','link'];
  document.getElementById('thead').innerHTML = '<tr>'+headers.map((h,i)=>
    `<th onclick="sortTable(${i})">${h}${sortCol===i?(sortAsc?' ▲':' ▼'):''}</th>`).join('')+'</tr>';

  document.getElementById('tbody').innerHTML = data.length ? data.map(p=>{
    const chName = CH_NAMES[p.channel]||p.channel;
    const wDisplay = p.weight ? p.weight+'g' : '<span class="no-weight">无</span>';
    const gDisplay = p.perG ? '¥'+p.perG.toFixed(2) : '<span class="no-weight">—</span>';
    const cDisplay = p.cost20 ? '¥'+p.cost20.toFixed(2) : '<span class="no-weight">—</span>';
    return `<tr>
      <td class="ch-${p.channel}">${chName}</td>
      <td title="${p.name.replace(/"/g,'&quot;')}">${truncate(p.name)}</td>
      <td>${p.brand}</td>
      <td style="color:#888;font-size:11px">${p.flavor || '-'}</td>
      <td><span class="tag tag-${p.type}">${p.type}</span></td>
      <td class="num">${wDisplay}</td>
      <td class="num">¥${p.price.toFixed(2)}</td>
      <td class="num">$${p.usd.toFixed(2)}</td>
      <td class="num">¥${p.tax.toFixed(2)}</td>
      <td class="num">${gDisplay}</td>
      <td class="num">${p.per500?'¥'+p.per500.toFixed(2):'<span class="no-weight">—</span>'}</td>
      <td class="num"><b>${cDisplay}</b></td>
      <td>${p.link?'<a href="'+p.link+'" target="_blank">🔗</a>':''}</td>
    </tr>`;
  }).join('') : '<tr><td colspan="13" class="empty">无匹配产品</td></tr>';
}

async function askAI() {
  const key = document.getElementById('aiKey').value.trim();
  const query = document.getElementById('aiQuery').value.trim();
  if (!key) { alert('请输入 DeepSeek API Key'); return; }
  if (!query) { alert('请输入问题'); return; }

  const btn = document.getElementById('aiBtn');
  const resp = document.getElementById('aiResponse');
  btn.disabled = true; btn.textContent = '思考中...';
  resp.style.display = 'block'; resp.textContent = '🤔 正在分析...';

  // 构建上下文
  const data = filtered();
  const chs = [...new Set(data.map(p=>p.channel))].map(c=>CH_NAMES[c]||c);
  const brands = [...new Set(data.map(p=>p.brand))].filter(Boolean);
  const types = [...new Set(data.map(p=>p.type))].filter(Boolean);
  const withWeight = data.filter(p=>p.weight>0).sort((a,b)=>a.cost20-b.cost20).slice(0,10);

  let context = `当前筛选数据：共 ${data.length} 条产品\n`;
  context += `渠道：${chs.join('、')}\n`;
  context += `品牌：${brands.length} 个\n`;
  context += `产品大类：${types.join('、')}\n\n`;
  context += `20支成本最低 TOP5：\n`;
  withWeight.slice(0,5).forEach(p => {
    context += `  ${p.name} | 品牌=${p.brand} | ${p.weight}g | 含税¥${p.tax} | 克¥${p.perG}/g | 20支¥${p.cost20}\n`;
  });
  context += `\n以下是用户问题：\n${query}`;

  try {
    const res = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: '你是手卷烟丝购买顾问，根据用户提供的价格数据给出推荐方案。回答简洁实用，用中文。' },
          { role: 'user', content: context }
        ],
        temperature: 0.7,
        max_tokens: 1024,
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    resp.textContent = data.choices?.[0]?.message?.content || '无回复';
  } catch (e) {
    resp.textContent = '❌ 请求失败：' + e.message;
  }
  btn.disabled = false; btn.textContent = '发送';
}

function sortTable(col) {
  if (sortCol===col) sortAsc=!sortAsc; else { sortCol=col; sortAsc=true; }
  const keys = ['channel','name','brand','type','weight','price','usd','tax','perG','per500','cost20','link'];
  const key = keys[col];
  products.sort((a,b)=>{
    const va = a[key]??'', vb = b[key]??'';
    return typeof va==='string' ? (sortAsc?va.localeCompare(vb):vb.localeCompare(va)) : sortAsc?va-vb:vb-va;
  });
  render();
}
</script>
</body>
</html>
